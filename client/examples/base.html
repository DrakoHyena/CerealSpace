<html>

<head>
    <link rel="stylesheet" href="/playStyle.css">
</head>

<body>
    <script defer type="module">
        import {CerealEntity} from "/js/entities/base.js";
        import {CerealClient} from "/js/clients/base.js";

        const canvas = document.getElementById("canvas");

        let client;

        let entityArray;
        const serverWorker = new Worker("/js/servers/base.js", {type: "module"});
        serverWorker.onmessage = (e) => {
            if (e.data.array) {
                entityArray = e.data.array
                client = new CerealClient(canvas, serverWorker, entityArray)
            }
        }

    </script>
    <canvas id="canvas"></canvas>
</body>


</html>
